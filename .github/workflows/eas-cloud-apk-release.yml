name: EAS Cloud APK Release

on:
  workflow_dispatch:

jobs:
  eas-cloud-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure EXPO_TOKEN exists
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "EXPO_TOKEN missing. Add it in Repo Settings > Secrets > Actions."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo/EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Trigger EAS cloud build and wait
        run: |
          CI=1 eas build --platform android --profile preview --non-interactive --wait --json > eas-build.json
          cat eas-build.json

      - name: Download APK from EAS URL
        run: |
          node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('eas-build.json','utf8'));const b=Array.isArray(data)?data[0]:data;const url=b?.artifacts?.buildUrl||b?.artifacts?.applicationArchiveUrl; if(!url){console.error('No APK URL found in eas-build.json'); process.exit(1);} console.log(url); fs.writeFileSync('apk-url.txt',url);"
          APK_URL=$(cat apk-url.txt)
          curl -L "$APK_URL" -o Yaad-Se-Dawai.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaad-se-dawai-eas-apk
          path: Yaad-Se-Dawai.apk

      - name: Create release tag
        id: tag
        run: echo "tag=v$(date +'%Y.%m.%d')-eas-${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Yaad se Dawai Cloud APK ${{ steps.tag.outputs.tag }}
          body: APK built via EAS Cloud and attached for direct install.
          files: Yaad-Se-Dawai.apk
