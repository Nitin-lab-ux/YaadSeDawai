name: Direct APK Release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform tools
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" || true
          yes | sdkmanager --licenses || true

      - name: Install dependencies (retry)
        run: |
          npm ci || (echo "npm ci failed, retrying in 20s..." && sleep 20 && npm ci)

      - name: Generate android project
        run: CI=1 npx expo prebuild --platform android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yaad-se-dawai-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Gradle reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports
          path: |
            android/app/build/reports
            android/build/reports

      - name: Create release tag
        if: success()
        id: tag
        run: echo "tag=v$(date +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with APK
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Yaad se Dawai APK ${{ steps.tag.outputs.tag }}
          body: Direct install APK build from GitHub Actions.
          files: android/app/build/outputs/apk/debug/app-debug.apk
